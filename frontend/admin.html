<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>系统管理 - AuroraShare</title>
    <!-- Element UI 样式 -->
    <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
    <!-- Font Awesome 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f7fa;
            min-height: 100vh;
            padding: 20px;
            transition: background-color 0.3s;
        }

        /* 暗黑模式 */
        body.dark-mode {
            background-color: #141414;
        }

        .admin-container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* 卡片样式 */
        .admin-card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            transition: all 0.3s;
        }

        .dark-mode .admin-card {
            background: #1f1f1f;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        .admin-header {
            padding: 24px 30px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .dark-mode .admin-header {
            border-bottom-color: #303030;
        }

        .admin-header-left {
            display: flex;
            align-items: center;
            gap: 16px;
            flex: 1;
        }

        .admin-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(145deg, #3b82f6, #8b5cf6);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .admin-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1e293b;
        }

        .dark-mode .admin-title {
            color: #e5e7eb;
        }

        .admin-content {
            padding: 30px;
        }

        /* 返回按钮 */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 20px;
            background: #f8fafc;
            color: #64748b;
            font-size: 0.9rem;
            transition: all 0.2s;
            cursor: pointer;
            border: 1px solid #e2e8f0;
        }

        .dark-mode .back-btn {
            background: #2d2d2d;
            color: #a0a0a0;
            border-color: #404040;
        }

        .back-btn:hover {
            background: #e2e8f0;
            color: #334155;
        }

        .dark-mode .back-btn:hover {
            background: #3d3d3d;
            color: #ffffff;
        }

        /* 路径显示 */
        .path-display {
            background: #f8fafc;
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 24px;
            border: 1px solid #e2e8f0;
            word-break: break-all;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.9rem;
        }

        .dark-mode .path-display {
            background: #2d2d2d;
            border-color: #404040;
            color: #e0e0e0;
        }

        /* 快捷按钮组 */
        .quick-btns {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 20px 0;
        }

        .quick-btn {
            padding: 8px 16px;
            border-radius: 30px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            color: #475569;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .dark-mode .quick-btn {
            background: #2d2d2d;
            border-color: #404040;
            color: #d0d0d0;
        }

        .quick-btn:hover {
            background: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }

        /* 盘符按钮组 */
        .drive-btns {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 20px 0;
        }

        .drive-btn {
            padding: 10px 24px;
            border-radius: 8px;
            background: #ffffff;
            border: 1px solid #d9d9d9;
            color: #333;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 70px;
            text-align: center;
        }

        .dark-mode .drive-btn {
            background: #2d2d2d;
            border-color: #404040;
            color: #e0e0e0;
        }

        .drive-btn:hover {
            background: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }

        /* 存储信息卡片网格 */
        .storage-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .storage-card-item {
            background: #f8fafc;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
        }

        .dark-mode .storage-card-item {
            background: #2d2d2d;
            border-color: #404040;
        }

        .storage-card-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
        }

        .storage-icon {
            font-size: 2rem;
            color: #3b82f6;
            margin-bottom: 12px;
        }

        .storage-label {
            font-size: 0.9rem;
            color: #64748b;
            margin-bottom: 8px;
        }

        .dark-mode .storage-label {
            color: #a0a0a0;
        }

        .storage-value {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1e293b;
        }

        .dark-mode .storage-value {
            color: #e5e7eb;
        }

        /* 进度条 */
        .storage-progress {
            margin: 20px 0;
            padding: 0 10px;
        }

        /* 响应式调整 */
        @media (max-width: 640px) {
            body {
                padding: 10px;
            }

            .admin-header {
                padding: 20px;
            }

            .admin-content {
                padding: 20px;
            }

            .admin-title {
                font-size: 1.2rem;
            }

            .admin-icon {
                width: 40px;
                height: 40px;
                font-size: 20px;
            }

            .storage-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .quick-btns {
                gap: 8px;
            }

            .quick-btn {
                padding: 6px 12px;
                font-size: 0.85rem;
            }

            .drive-btns {
                gap: 8px;
            }

            .drive-btn {
                padding: 8px 16px;
                min-width: 60px;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 480px) {
            .admin-header-left {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .back-btn {
                width: 100%;
                justify-content: center;
            }
        }

        /* 加载状态 */
        .loading-skeleton {
            padding: 40px;
            text-align: center;
        }

        /* 提示框自定义 */
        .custom-alert {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            min-width: 280px;
            max-width: 400px;
        }

        @media (max-width: 640px) {
            .custom-alert {
                left: 20px;
                right: 20px;
                max-width: none;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- 自定义提示框 -->
        <transition name="el-fade-in-linear">
            <div v-if="alert.show" class="custom-alert">
                <el-alert
                    :title="alert.message"
                    :type="alert.type"
                    :closable="true"
                    @close="alert.show = false"
                    effect="dark">
                </el-alert>
            </div>
        </transition>

        <div class="admin-container">
            <el-card class="admin-card" :body-style="{ padding: 0 }">
                <!-- 头部 -->
                <div class="admin-header">
                    <div class="admin-header-left">
                        <div class="admin-icon">
                            <i class="fas fa-cog"></i>
                        </div>
                        <span class="admin-title">系统管理</span>
                    </div>
                    <div>
                        <el-button @click="goBack" size="medium" plain>
                            <i class="fas fa-arrow-left"></i> 返回文件管理
                        </el-button>
                    </div>
                </div>

                <!-- 内容区 -->
                <div class="admin-content">
                    <!-- 当前路径卡片 -->
                    <el-card shadow="never" class="path-display-card" :body-style="{ padding: 0 }">
                        <div class="path-display">
                            <el-row :gutter="16" align="middle">
                                <el-col :span="24" :md="4">
                                    <strong><i class="fas fa-folder-open" style="color: #3b82f6;"></i> 当前路径：</strong>
                                </el-col>
                                <el-col :span="24" :md="20">
                                    <span>{{ storageInfo.storage_path || '未设置' }}</span>
                                </el-col>
                            </el-row>
                        </div>
                    </el-card>

                    <!-- 存储空间进度条 -->
                    <div class="storage-progress">
                        <el-row :gutter="16" align="middle">
                            <el-col :span="24" :md="4">
                                <span style="color: #64748b;">使用率</span>
                            </el-col>
                            <el-col :span="24" :md="20">
                                <el-progress
                                    :percentage="storageInfo.percentage || 0"
                                    :color="storagePercentageColor"
                                    :stroke-width="12"
                                    :format="formatProgress">
                                </el-progress>
                            </el-col>
                        </el-row>
                    </div>

                    <!-- 存储信息卡片 -->
                    <div class="storage-grid">
                        <div class="storage-card-item">
                            <div class="storage-icon">
                                <i class="fas fa-database"></i>
                            </div>
                            <div class="storage-label">总空间</div>
                            <div class="storage-value">{{ storageInfo.total_gb || 0 }} GB</div>
                        </div>
                        <div class="storage-card-item">
                            <div class="storage-icon">
                                <i class="fas fa-chart-bar"></i>
                            </div>
                            <div class="storage-label">已用空间</div>
                            <div class="storage-value">{{ storageInfo.used_gb || 0 }} GB</div>
                        </div>
                        <div class="storage-card-item">
                            <div class="storage-icon">
                                <i class="fas fa-chart-line"></i>
                            </div>
                            <div class="storage-label">剩余空间</div>
                            <div class="storage-value">{{ storageInfo.free_gb || 0 }} GB</div>
                        </div>
                    </div>

                    <!-- 修改路径表单 -->
                    <el-divider content-position="left">
                        <i class="fas fa-edit" style="margin-right: 5px;"></i>修改存储路径
                    </el-divider>

                    <el-form @submit.native.prevent="updateStoragePath">
                        <!-- Windows 盘符快速选择 -->
                        <div class="drive-btns" v-if="isWindows">
                            <button
                                v-for="drive in windowsDrives"
                                :key="drive"
                                type="button"
                                class="drive-btn"
                                @click="setPath(drive)">
                                {{ drive }}
                            </button>
                        </div>

                        <!-- 常用路径建议 -->
                        <div class="quick-btns">
                            <button
                                v-for="suggest in suggestions"
                                :key="suggest.path"
                                type="button"
                                class="quick-btn"
                                @click="setPath(suggest.path)">
                                <i :class="suggest.icon"></i> {{ suggest.name }}
                            </button>
                        </div>

                        <el-form-item>
                            <el-input
                                v-model="newPath"
                                placeholder="请输入完整的绝对路径，例如：D:\shared_files 或 /home/user/shared"
                                clearable
                                size="large">
                                <template slot="prepend">
                                    <i class="fas fa-folder"></i>
                                </template>
                            </el-input>
                        </el-form-item>

                        <el-form-item>
                            <el-button
                                type="primary"
                                @click="updateStoragePath"
                                :loading="updating"
                                size="large"
                                style="width: 100%;">
                                <i class="fas fa-save"></i> 更新存储路径
                            </el-button>
                        </el-form-item>
                    </el-form>

                    <!-- 提示信息 -->
                    <el-alert
                        title="修改路径后，文件浏览将基于新目录。请确保新路径存在且有写入权限。"
                        type="info"
                        :closable="false"
                        show-icon>
                    </el-alert>
                </div>
            </el-card>
        </div>
    </div>

    <!-- 引入 Vue 和 Element UI -->
    <script src="https://unpkg.com/vue@2/dist/vue.js"></script>
    <script src="https://unpkg.com/element-ui/lib/index.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script>
        // 配置 axios
        axios.defaults.baseURL = '';

        new Vue({
            el: '#app',
            data() {
                return {
                    // 存储信息
                    storageInfo: {
                        storage_path: '',
                        total_gb: 0,
                        used_gb: 0,
                        free_gb: 0,
                        percentage: 0
                    },
                    // 新路径输入
                    newPath: '',
                    // 更新状态
                    updating: false,
                    // 系统判断
                    isWindows: navigator.platform.indexOf('Win') > -1,
                    // Windows 盘符
                    windowsDrives: ['C:\\', 'D:\\', 'E:\\', 'F:\\', 'G:\\', 'H:\\'],
                    // 常用路径建议
                    suggestions: [
                        { name: '共享文件夹', path: 'D:\\shared_files', icon: 'fas fa-folder' },
                        { name: '文档目录', path: 'C:\\Users\\Public\\Documents', icon: 'fas fa-file-word' },
                        { name: '数据盘', path: 'E:\\files', icon: 'fas fa-hdd' },
                        { name: 'Linux共享', path: '/home/user/shared', icon: 'fab fa-linux' },
                        { name: '挂载目录', path: '/mnt/data', icon: 'fas fa-cloud' }
                    ],
                    // 提示框
                    alert: {
                        show: false,
                        message: '',
                        type: 'info'
                    },
                    // 加载状态
                    loading: true
                };
            },
            mounted() {
                this.loadConfig();
                // 检查暗黑模式
                this.checkDarkMode();
            },
            methods: {
                // 加载配置
                async loadConfig() {
                    try {
                        const response = await axios.get('/api/storage');
                        if (response.data) {
                            this.storageInfo = response.data;
                            this.newPath = response.data.storage_path || '';
                        }
                    } catch (error) {
                        console.error('加载配置失败:', error);
                        this.showAlert('加载配置失败', 'error');
                    }
                },

                // 检查暗黑模式
                checkDarkMode() {
                    const isDark = localStorage.getItem('theme') === 'dark' ||
                        (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);

                    if (isDark) {
                        document.body.classList.add('dark-mode');
                    }
                },

                // 设置路径
                setPath(path) {
                    this.newPath = path;
                },

                // 更新存储路径
                async updateStoragePath() {
                    if (!this.newPath || !this.newPath.trim()) {
                        this.showAlert('请输入路径', 'warning');
                        return;
                    }

                    // Windows路径验证提示
                    if (this.isWindows && !this.newPath.match(/^[a-zA-Z]:\\/)) {
                        try {
                            await this.$confirm('路径格式可能不正确，Windows通常使用盘符开头如 D:\\，确定要继续吗？', '提示', {
                                confirmButtonText: '继续',
                                cancelButtonText: '取消',
                                type: 'warning'
                            });
                        } catch {
                            return;
                        }
                    }

                    this.updating = true;

                    try {
                        const formData = new URLSearchParams();
                        formData.append('new_path', this.newPath.trim());

                        const response = await axios.post('/api/storage/path', formData, {
                            headers: {
                                'Content-Type': 'application/x-www-form-urlencoded'
                            }
                        });

                        if (response.data.success) {
                            this.showAlert('存储路径更新成功！', 'success');
                            await this.loadConfig(); // 重新加载配置
                        } else {
                            this.showAlert('更新失败，请确保路径存在且有写入权限', 'error');
                        }
                    } catch (error) {
                        console.error('更新路径失败:', error);
                        this.showAlert('更新失败: ' + (error.response?.data?.error || error.message), 'error');
                    } finally {
                        this.updating = false;
                    }
                },

                // 返回文件管理
                goBack() {
                    window.location.href = '/';
                },

                // 显示提示
                showAlert(message, type) {
                    this.alert = {
                        show: true,
                        message: message,
                        type: type
                    };

                    setTimeout(() => {
                        this.alert.show = false;
                    }, 5000);
                },

                // 进度条颜色
                storagePercentageColor(percentage) {
                    if (percentage < 70) return '#3b82f6';
                    if (percentage < 90) return '#f59e0b';
                    return '#ef4444';
                },

                // 进度条格式化
                formatProgress(percentage) {
                    return percentage + '%';
                }
            }
        });
    </script>
</body>
</html>
